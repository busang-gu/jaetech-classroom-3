<!-- 인증 게이트 -->
<style id="auth-gate-style">html { visibility: hidden; }</style>
<script>
(async function authGate() {
  try {
    const r = await fetch('/api/me', { credentials: 'same-origin', cache: 'no-store' });
    if (!r.ok) throw new Error('unauth');
    const user = await r.json();
    if (user.banned) {
      const q = user.reason ? '?reason=' + encodeURIComponent(user.reason) : '';
      location.replace('/banned.html' + q);
      return;
    }
    window.__user = user;
    document.documentElement.style.visibility = 'visible';
    const fireReady = function() { document.dispatchEvent(new CustomEvent('auth-ready', { detail: user })); };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fireReady);
    } else {
      fireReady();
    }
  } catch {
    location.replace('/login.html?return=' + encodeURIComponent(location.pathname + location.search));
  }
})();
</script>

<script>
let state = { students: [], summary: null, filter: 'all', search: '', user: null };

function escapeHtml(s) {
  return String(s || '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function avatarClass(id) {
  const variants = ['', 's2', 's3', 's4', 's5'];
  let hash = 0;
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  return variants[hash % variants.length];
}

function renderStats(summary) {
  document.getElementById('stat-total').textContent = summary.total;
  document.getElementById('stat-completed').textContent = summary.completed;
  document.getElementById('stat-scheduled').textContent = summary.scheduled;
  document.getElementById('stat-pending').textContent = summary.pending;

  document.getElementById('cnt-all').textContent = summary.total;
  document.getElementById('cnt-completed').textContent = summary.completed;
  document.getElementById('cnt-scheduled').textContent = summary.scheduled;
  document.getElementById('cnt-pending').textContent = summary.pending;
}

function renderRow(s) {
  const init = (s.nickname || '?').trim().charAt(0);
  const ac = avatarClass(s.kakao_id || s.id);
  const isMe = state.user && state.user.userId === s.id;

  const status = s.training_status || 'pending';
  const icons = { completed: '⭕', scheduled: '🔺', pending: '❌' };
  const statusIcon = `<span class="status-icon ${status}">${icons[status]}</span>`;

  const toggle = `
    <div class="status-toggle" data-student-id="${escapeHtml(s.id)}">
      <button type="button" class="pending ${status === 'pending' ? 'on' : ''}" data-status="pending" title="미정">❌</button>
      <button type="button" class="scheduled ${status === 'scheduled' ? 'on' : ''}" data-status="scheduled" title="예정">🔺</button>
      <button type="button" class="completed ${status === 'completed' ? 'on' : ''}" data-status="completed" title="진행 중">⭕</button>
    </div>
  `;

  const prefMap = { weekday: { icon: '💼', label: '평일' }, weekend: { icon: '🌞', label: '주말' } };
  const prefData = prefMap[s.training_preference];
  const prefCell = prefData
    ? `<span class="pref-pill">${prefData.icon} ${prefData.label}</span>`
    : `<span class="pref-pill empty">—</span>`;

  return `
    <tr data-student-id="${escapeHtml(s.id)}">
      <td>
        <div class="student-name">
          <span class="avatar ${ac}">${escapeHtml(init)}</span>
          <div class="info">
            <span class="nick">${escapeHtml(s.nickname)}${isMe ? ' <span class="me">· 나</span>' : ''}</span>
          </div>
        </div>
      </td>
      <td style="text-align:center;">${prefCell}</td>
      <td style="text-align:center;">${statusIcon}${toggle}</td>
    </tr>
  `;
}

function matchFilter(s) {
  if (state.filter === 'all') return true;
  return (s.training_status || 'pending') === state.filter;
}
function matchSearch(s) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return (s.nickname || '').toLowerCase().includes(q);
}

function renderTable() {
  const filtered = state.students.filter(s => matchFilter(s) && matchSearch(s));
  const tbody = document.getElementById('students-tbody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="2" class="empty-state">조건에 맞는 수강생이 없어요.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(renderRow).join('');
}

// 관리자 토글 핸들러
document.getElementById('students-tbody').addEventListener('click', async (e) => {
  const btn = e.target.closest('.status-toggle button');
  if (!btn) return;
  if (!state.user || !state.user.isAdmin) return;

  const wrap = btn.parentElement;
  const studentId = wrap.dataset.studentId;
  const newStatus = btn.dataset.status;

  // optimistic
  wrap.querySelectorAll('button').forEach(b => {
    b.classList.toggle('on', b.dataset.status === newStatus);
    b.classList.add('saving');
  });

  try {
    const res = await fetch('/api/admin/training', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ student_id: studentId, status: newStatus }),
    });
    if (!res.ok) throw new Error('save failed');
    // state 업데이트
    const s = state.students.find(x => x.id === studentId);
    if (s) {
      const before = s.training_status || 'pending';
      s.training_status = newStatus;
      // summary 재계산
      if (before !== newStatus) {
        state.summary[before] = Math.max(0, (state.summary[before] || 0) - 1);
        state.summary[newStatus] = (state.summary[newStatus] || 0) + 1;
        renderStats(state.summary);
      }
    }
  } catch (err) {
    alert('저장 실패: ' + err.message + ' — 새로고침 후 다시 시도해주세요.');
  } finally {
    wrap.querySelectorAll('button').forEach(b => b.classList.remove('saving'));
  }
});

document.getElementById('search-input').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderTable();
});
document.getElementById('filter-chips').addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#filter-chips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  state.filter = btn.dataset.filter;
  renderTable();
});

async function load() {
  try {
    const r = await fetch('/api/training', { cache: 'no-store' });
    if (!r.ok) {
      document.getElementById('students-tbody').innerHTML =
        `<tr><td colspan="2" class="empty-state">데이터를 불러오지 못했어요.</td></tr>`;
      return;
    }
    const { summary, students } = await r.json();
    state.students = students || [];
    state.summary = summary;
    renderStats(summary);
    renderTable();
  } catch (e) {
    console.error('training load failed', e);
    document.getElementById('students-tbody').innerHTML =
      `<tr><td colspan="2" class="empty-state">오류: ${e.message}</td></tr>`;
  }
}

document.addEventListener('auth-ready', (e) => {
  const user = e.detail || {};
  state.user = user;
  document.getElementById('nav-nick').textContent = (user.nickname || '수강생') + (user.isAdmin ? ' (관리자)' : '');
  if (user.isAdmin) {
    document.body.classList.add('is-admin');
    const adminLink = document.getElementById('nav-admin');
    if (adminLink) adminLink.style.display = '';
  }
  load();
});
</script>

</body>
</html>
