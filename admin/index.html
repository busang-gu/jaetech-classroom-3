<style id="auth-gate-style">html { visibility: hidden; }</style>
<script>
(async function authGate() {
  try {
    const r = await fetch('/api/me', { credentials: 'same-origin', cache: 'no-store' });
    if (!r.ok) throw new Error('unauth');
    const user = await r.json();
    if (user.banned) {
      const q = user.reason ? '?reason=' + encodeURIComponent(user.reason) : '';
      location.replace('/banned.html' + q);
      return;
    }
    if (!user.isAdmin) {
      location.replace('/');
      return;
    }
    window.__user = user;
    document.documentElement.style.visibility = 'visible';
    var fireReady = function() { document.dispatchEvent(new CustomEvent('auth-ready', { detail: user })); };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fireReady);
    } else {
      fireReady();
    }
  } catch {
    location.replace('/login.html?return=' + encodeURIComponent(location.pathname));
  }
})();
</script>

<script>
// 주차 메타 (6/29 개강)
const WEEKS = [
  { n: 1, unlock: '2026-06-29', due: '2026-07-05' },
  { n: 2, unlock: '2026-06-29', due: '2026-07-12' },
  { n: 3, unlock: '2026-07-13', due: '2026-07-19' },
  { n: 4, unlock: '2026-07-20', due: '2026-07-26' },
];

let state = { students: [], summary: null, filter: 'all', search: '' };

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const wk = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${m}/${day} (${wk})`;
}
function daysUntil(dateStr) {
  const t = new Date(dateStr + 'T23:59:59').getTime();
  return Math.ceil((t - Date.now()) / (1000 * 60 * 60 * 24));
}
function relativeTime(iso) {
  if (!iso) return '미접속';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '방금 전';
  if (mins < 60) return mins + '분 전';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '시간 전';
  const days = Math.floor(hours / 24);
  if (days < 7) return days + '일 전';
  return fmtDate(iso);
}
function escapeHtml(s) {
  return String(s || '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function avatarClass(id) {
  const variants = ['', 's2', 's3', 's4', 's5'];
  let hash = 0;
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  return variants[hash % variants.length];
}

function weekCellHtml(weekData, weekMeta) {
  const now = Date.now();
  const unlockTs = new Date(weekMeta.unlock + 'T00:00:00').getTime();
  if (now < unlockTs) return '<span class="week-cell locked">·</span>';
  if (weekData?.status === 'submitted') return '<span class="week-cell submitted">✓</span>';
  if (weekData?.status === 'draft') return '<span class="week-cell draft">📝</span>';
  return '<span class="week-cell pending">✗</span>';
}

function statusBadgeHtml(status) {
  if (status === 'on-track') return '<span class="status-badge on-track">✓ 정상</span>';
  if (status === 'at-risk') return '<span class="status-badge at-risk">⏰ 늦어짐</span>';
  if (status === 'late') return '<span class="status-badge late">⚠ 강퇴 후보</span>';
  if (status === 'completed') return '<span class="status-badge completed">🎉 완주</span>';
  return '<span class="status-badge">—</span>';
}

function renderWeeklySummary(summary, totalStudents) {
  const html = WEEKS.map(meta => {
    const n = meta.n;
    const submitted = summary?.week_submitted?.[n] || 0;
    const pct = totalStudents ? Math.round((submitted / totalStudents) * 100) : 0;
    const now = Date.now();
    const unlockTs = new Date(meta.unlock + 'T00:00:00').getTime();
    const dueTs = new Date(meta.due + 'T23:59:59').getTime();

    let metaRight = '';
    if (now < unlockTs) {
      metaRight = `<span>${fmtDate(meta.unlock)} 오픈</span>`;
    } else if (now > dueTs) {
      metaRight = `<span>마감 ${fmtDate(meta.due)} 종료</span>`;
    } else {
      const days = daysUntil(meta.due);
      metaRight = `<span>D-${days}</span>`;
    }

    return `
      <div class="week-summary">
        <div class="head">
          <span class="tag">WEEK ${String(n).padStart(2,'0')}</span>
          <span class="ratio">${submitted}<small> / ${totalStudents || '—'}</small></span>
        </div>
        <div class="progress"><div style="width: ${pct}%;"></div></div>
        <div class="meta">
          <span>${pct}% 제출</span>
          ${metaRight}
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('weekly-grid').innerHTML = html;
}

function renderKPI(summary, totalStudents) {
  document.getElementById('kpi-total').textContent = totalStudents;
  document.getElementById('kpi-total-sub').textContent =
    totalStudents ? `${totalStudents}명 가입 완료` : '아직 가입자 없음';

  const w1 = summary?.week_submitted?.[1] || 0;
  document.getElementById('kpi-w1-submitted').textContent = w1;
  document.getElementById('kpi-w1-of').textContent = '/ ' + totalStudents;
  const w1Late = Math.max(0, totalStudents - w1);
  const w1SubEl = document.getElementById('kpi-w1-sub');
  if (Date.now() > new Date(WEEKS[0].due + 'T23:59:59').getTime() && w1Late > 0) {
    w1SubEl.textContent = `⚠ 미제출 ${w1Late}명 · 강퇴 후보`;
    w1SubEl.className = 'trend warn';
  } else if (totalStudents) {
    w1SubEl.textContent = `${Math.round(w1/totalStudents*100)}% 제출`;
    w1SubEl.className = 'trend up';
  } else {
    w1SubEl.textContent = '—';
  }

  // 평균 진도
  const totalSubmissions = state.students.reduce((a, s) => a + s.submitted_count, 0);
  const avgPct = totalStudents ? Math.round((totalSubmissions / (totalStudents * 4)) * 100) : 0;
  document.getElementById('kpi-avg-pct').textContent = avgPct;
  document.getElementById('kpi-avg-sub').textContent = `완주 ${summary?.completed || 0}명`;

  // 다음 마감
  const now = Date.now();
  const nextWeek = WEEKS.find(m => now < new Date(m.due + 'T23:59:59').getTime());
  if (nextWeek) {
    document.getElementById('kpi-next-due').textContent = fmtDate(nextWeek.due);
    const days = daysUntil(nextWeek.due);
    document.getElementById('kpi-next-sub').textContent =
      `WEEK ${String(nextWeek.n).padStart(2,'0')} — ${days > 0 ? days + '일 남음' : '오늘 마감'}`;
  } else {
    document.getElementById('kpi-next-due').textContent = '완료';
    document.getElementById('kpi-next-sub').textContent = '4주 챌린지 종료';
  }
}

function renderFilters(summary) {
  document.getElementById('cnt-all').textContent = state.students.length;
  document.getElementById('cnt-on-track').textContent = summary?.on_track || 0;
  document.getElementById('cnt-at-risk').textContent = summary?.at_risk || 0;
  document.getElementById('cnt-late').textContent = summary?.late || 0;
}

function matchFilter(s) {
  if (state.filter === 'all') return true;
  if (state.filter === 'submitted') return s.status === 'on-track' || s.status === 'completed';
  if (state.filter === 'at-risk') return s.status === 'at-risk';
  if (state.filter === 'late') return s.status === 'late';
  return true;
}

function matchSearch(s) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return (s.nickname || '').toLowerCase().includes(q) || (s.kakao_id || '').toLowerCase().includes(q);
}

function renderTable() {
  const filtered = state.students.filter(s => matchFilter(s) && matchSearch(s));
  const html = filtered.map(s => {
    const init = (s.nickname || '?').trim().charAt(0);
    const ac = avatarClass(s.kakao_id || s.id);
    return `
      <tr${s.is_banned ? ' style="background:#FEF2F2; opacity:0.7;"' : ''}>
        <td>
          <div class="student-name">
            <span class="avatar ${ac}">${escapeHtml(init)}</span>
            <div class="info">
              <span class="nick">${escapeHtml(s.nickname)}${s.is_banned ? ' <span style="display:inline-block;padding:2px 8px;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;border-radius:999px;font-size:10px;font-weight:800;margin-left:4px;">🚫 강퇴</span>' : ''}</span>
              <span class="kakao-id">kakao_${escapeHtml(s.kakao_id)}</span>
            </div>
          </div>
        </td>
        <td>${weekCellHtml(s.weeks[1], WEEKS[0])}</td>
        <td>${weekCellHtml(s.weeks[2], WEEKS[1])}</td>
        <td>${weekCellHtml(s.weeks[3], WEEKS[2])}</td>
        <td>${weekCellHtml(s.weeks[4], WEEKS[3])}</td>
        <td>
          <div class="progress-mini">
            <div class="bar"><div style="width: ${s.progress_pct}%;"></div></div>
            <span class="pct">${s.progress_pct}%</span>
          </div>
        </td>
        <td>${statusBadgeHtml(s.status)}</td>
        <td><span class="last-active">${relativeTime(s.last_login_at)}</span></td>
        <td><a class="btn-detail" href="/admin/student.html?id=${encodeURIComponent(s.id)}">상세</a></td>
      </tr>
    `;
  }).join('');

  document.getElementById('students-tbody').innerHTML = html || `
    <tr><td colspan="9" style="text-align:center; padding:32px; color: var(--text-muted); font-size: 13px;">조건에 맞는 수강생이 없어요.</td></tr>
  `;

  const footer = document.getElementById('list-footer');
  if (state.students.length === 0) {
    footer.textContent = '아직 등록한 수강생이 없어요.';
  } else if (filtered.length === state.students.length) {
    footer.textContent = `전체 ${state.students.length}명`;
  } else {
    footer.textContent = `${filtered.length}명 표시 · 전체 ${state.students.length}명`;
  }

  document.getElementById('students-count').textContent = `${state.students.length}명`;
}

async function load() {
  try {
    const r = await fetch('/api/admin/students', { cache: 'no-store' });
    if (!r.ok) {
      document.getElementById('list-footer').textContent = '데이터를 불러오지 못했어요.';
      return;
    }
    const { summary, students } = await r.json();
    state.students = students || [];
    state.summary = summary;
    renderKPI(summary, state.students.length);
    renderWeeklySummary(summary, state.students.length);
    renderFilters(summary);
    renderTable();
  } catch (e) {
    console.error('admin load failed', e);
    document.getElementById('list-footer').textContent = '오류 발생: ' + e.message;
  }
}

document.getElementById('search-input').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderTable();
});

document.getElementById('filter-chips').addEventListener('click', (e) => {
  const btn = e.target.closest('.chip');
  if (!btn) return;
  document.querySelectorAll('#filter-chips .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  state.filter = btn.dataset.filter;
  renderTable();
});

document.addEventListener('auth-ready', (e) => {
  const user = e.detail || {};
  const nick = document.querySelector('.nav-user .nick');
  if (nick) nick.textContent = user.nickname || '관리자';
  load();
});

document.getElementById('logout-btn')?.addEventListener('click', (e) => {
  e.preventDefault();
  location.href = '/api/auth/logout';
});
</script>

</body>
</html>
