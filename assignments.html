<style id="auth-gate-style">html { visibility: hidden; }</style>
<script>
(async function authGate() {
  try {
    const r = await fetch('/api/me', { credentials: 'same-origin', cache: 'no-store' });
    if (!r.ok) throw new Error('unauth');
    const user = await r.json();
    if (user.banned) {
      const q = user.reason ? '?reason=' + encodeURIComponent(user.reason) : '';
      location.replace('/banned.html' + q);
      return;
    }
    window.__user = user;
    document.documentElement.style.visibility = 'visible';
    var fireReady = function() { document.dispatchEvent(new CustomEvent('auth-ready', { detail: user })); };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fireReady);
    } else {
      fireReady();
    }
  } catch {
    location.replace('/login.html?return=' + encodeURIComponent(location.pathname + location.search));
  }
})();
</script>

<script>
// 주차 메타 (6/29 개강)
const WEEKS = [
  { n: 1, title: '🔹 내 자산 그릇 점검하기',                       unlock: '2026-06-29', due: '2026-07-05', template: '내집도은퇴도_1주차_과제양식.xlsx' },
  { n: 2, title: '🔹 평생 흔들리지 않는 자산 구조 — 은퇴 체력 만들기', unlock: '2026-06-29', due: '2026-07-12', template: '내집도은퇴도_2주차_과제양식.xlsx' },
  { n: 3, title: '🔹 내 집 마련 기초',                              unlock: '2026-07-13', due: '2026-07-19' },
  { n: 4, title: '🔹 나만의 똘똘한 1채 찾기',                       unlock: '2026-07-20', due: '2026-07-26' },
];

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const wk = ['일','월','화','수','목','금','토'][d.getDay()];
  return `${m}/${day} (${wk})`;
}
function fmtDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${m}/${day} ${hh}:${mm}`;
}
function daysUntil(iso) {
  if (!iso) return null;
  const t = new Date(iso + 'T23:59:59').getTime();
  return Math.ceil((t - Date.now()) / (1000 * 60 * 60 * 24));
}

function escapeHtml(s) {
  return String(s || '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function getWeekStatus(meta, assignment) {
  const now = Date.now();
  const unlockTs = new Date(meta.unlock + 'T00:00:00').getTime();
  if (now < unlockTs) return 'locked';
  if (assignment?.status === 'submitted') return 'submitted';
  if (assignment?.status === 'draft') return 'draft';
  return 'pending';
}

function renderWeekCard(meta, assignment, status) {
  const due = fmtDate(meta.due);
  const days = daysUntil(meta.due);
  const dayLabel = days > 0 ? ` · ${days}일 남음` : days === 0 ? ' · 오늘 마감' : '';

  let statusBadge = '';
  let actions = '';
  let preview = '';
  let metaExtra = '';

  // 양식 다운로드 버튼 (template 있고 잠금 해제 상태일 때만)
  const tplBtn = (meta.template && status !== 'locked')
    ? `<a class="btn btn-ghost btn-sm" href="./assignments/${encodeURIComponent(meta.template)}" download="${escapeHtml(meta.template)}" title="양식 다운로드">📥 양식</a>`
    : '';

  if (status === 'submitted') {
    statusBadge = `<span class="week-status submitted">✓ 제출 완료</span>`;
    const txt = assignment.proof_text?.slice(0, 90) || '(인증 글 없음)';
    preview = `<div class="week-preview">${escapeHtml(txt)}${assignment.proof_text?.length > 90 ? '…' : ''}</div>`;
    const imgs = assignment.assignment_images?.length || 0;
    const netWorth = computeNetWorth(assignment.form_data);
    metaExtra = `<div class="week-preview-meta">
      <span class="img-count">📎 첨부 ${imgs}장</span>
      ${netWorth != null ? `<span class="sep">순자산 ${netWorth.toLocaleString()}만원</span>` : ''}
    </div>`;
    actions = `${tplBtn}<a class="btn btn-success btn-sm" href="./submit.html?week=${meta.n}">수정</a>`;
  } else if (status === 'draft') {
    statusBadge = `<span class="week-status draft">📝 임시 저장</span>`;
    const txt = assignment.proof_text?.slice(0, 90) || '(아직 작성 중)';
    preview = `<div class="week-preview">${escapeHtml(txt)}${assignment.proof_text?.length > 90 ? '…' : ''}</div>`;
    actions = `${tplBtn}<a class="btn btn-primary" href="./submit.html?week=${meta.n}">이어 작성</a>`;
  } else if (status === 'pending') {
    statusBadge = `<span class="week-status pending">⏰ 미작성</span>`;
    actions = `${tplBtn}<a class="btn btn-primary" href="./submit.html?week=${meta.n}">작성하기</a>`;
  } else {
    // locked
    statusBadge = `<span class="week-status locked">🔒 미공개</span>`;
    actions = `<button class="btn btn-ghost" disabled>잠김</button>`;
  }

  const submittedAt = assignment?.submitted_at ? `<span class="sep">${fmtDateTime(assignment.submitted_at)} 제출</span>` : '';
  const updatedAt = !submittedAt && assignment?.updated_at ? `<span class="sep">${fmtDateTime(assignment.updated_at)} 마지막 수정</span>` : '';

  const lockedClass = status === 'locked' ? ' locked' : '';
  const unlockHint = status === 'locked' ? `${fmtDate(meta.unlock)} 공개 예정 · ${due} 마감` : `${due} 마감${dayLabel}`;

  return `
    <article class="week-card${lockedClass}">
      <div class="week-card-body">
        <div class="week-card-top">
          <span class="week-badge">WEEK ${String(meta.n).padStart(2,'0')}</span>
          ${statusBadge}
        </div>
        <h3 class="week-title">${meta.title}</h3>
        <div class="week-meta">
          <span>${unlockHint}</span>
          ${submittedAt}${updatedAt}
        </div>
        ${preview}
        ${metaExtra}
      </div>
      <div class="week-actions">${actions}</div>
    </article>
  `;
}

function computeNetWorth(fd) {
  if (!fd) return null;
  const sum = (arr) => Array.isArray(arr) ? arr.reduce((a,b)=>a+(parseFloat(b)||0),0) : 0;
  const asset = sum(fd.asset);
  const debt = sum(fd.debt);
  if (asset === 0 && debt === 0) return null;
  return asset - debt;
}

function renderAll(assignments) {
  // assignments: array of { week, status, form_data, proof_text, submitted_at, ... }
  const byWeek = {};
  for (const a of assignments || []) byWeek[a.week] = a;

  // 카드
  const html = WEEKS.map(meta => {
    const a = byWeek[meta.n];
    const status = getWeekStatus(meta, a);
    return renderWeekCard(meta, a, status);
  }).join('');
  document.getElementById('week-list').innerHTML = html;

  // 통계
  let submitted = 0, streak = 0;
  let nextDue = null;
  let lastSubmitted = -1;
  for (const meta of WEEKS) {
    const a = byWeek[meta.n];
    const status = getWeekStatus(meta, a);
    if (status === 'submitted') {
      submitted++;
      lastSubmitted = meta.n;
    } else if (status !== 'locked' && !nextDue) {
      nextDue = meta;
    }
  }
  // 연속 제출 — 1주차부터 연속으로 submitted인 개수
  for (let i = 0; i < WEEKS.length; i++) {
    const a = byWeek[WEEKS[i].n];
    if (a?.status === 'submitted') streak++;
    else break;
  }
  // 다음 마감이 없으면 다음 잠긴 주차
  if (!nextDue) nextDue = WEEKS.find(m => Date.now() < new Date(m.unlock).getTime()) || null;

  document.getElementById('stat-submitted').textContent = submitted;
  document.getElementById('stat-pct').textContent = Math.round((submitted / 4) * 100);
  document.getElementById('stat-next').textContent = nextDue ? fmtDate(nextDue.due) : '완료';
  document.getElementById('stat-streak').textContent = streak;

  // 진행 바
  const segs = document.querySelectorAll('#progress-mini .seg');
  WEEKS.forEach((meta, i) => {
    const a = byWeek[meta.n];
    const status = getWeekStatus(meta, a);
    segs[i].className = 'seg';
    if (status === 'submitted') segs[i].classList.add('done');
    else if (status === 'draft' || status === 'pending') segs[i].classList.add('active');
  });
}

async function load() {
  try {
    const r = await fetch('/api/assignments', { cache: 'no-store' });
    if (!r.ok) {
      renderAll([]);
      return;
    }
    const { assignments } = await r.json();
    renderAll(assignments || []);
  } catch (e) {
    console.error('load failed', e);
    renderAll([]);
  }
}

document.addEventListener('auth-ready', (e) => {
  const user = e.detail || {};
  const nick = document.querySelector('.nav-user .nick');
  if (nick) nick.textContent = user.nickname || '수강생';
  load();
});

document.getElementById('logout-btn')?.addEventListener('click', (e) => {
  e.preventDefault();
  location.href = '/api/auth/logout';
});
</script>
